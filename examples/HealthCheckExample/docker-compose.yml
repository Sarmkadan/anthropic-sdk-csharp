version: '3.9'

services:
  health-check-example:
    build:
      context: ../..
      dockerfile: examples/HealthCheckExample/Dockerfile
    container_name: health-check-example
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped